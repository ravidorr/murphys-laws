name: MurphysLaws
options:
  bundleIdPrefix: com.murphyslaws
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  xcodeVersion: "14.0"

settings:
  MARKETING_VERSION: "1.0.2"
  CURRENT_PROJECT_VERSION: "3"

targets:
  MurphysLaws:
    type: application
    platform: iOS
    sources:
      - path: MurphysLaws
        # The hand-authored Info.plist is the source of truth (referenced
        # by INFOPLIST_FILE below). Excluded from the source scan so
        # XcodeGen doesn't also add it to Copy Bundle Resources, which
        # produces `Multiple commands produce ... MurphysLaws.app/Info.plist`
        # at build time.
        excludes:
          - "Info.plist"
      - path: ../shared/content
        name: content
        type: folder
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLaws
      INFOPLIST_FILE: MurphysLaws/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      SWIFT_VERSION: "5.9"
      ENABLE_PREVIEWS: YES
    scheme:
      testTargets:
        - MurphysLawsTests
        - MurphysLawsUITests

  MurphysLawsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MurphysLawsTests
    dependencies:
      - target: MurphysLaws
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLawsTests
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES

  MurphysLawsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - MurphysLawsUITests
    dependencies:
      - target: MurphysLaws
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLawsUITests
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES

schemes:
  MurphysLaws:
    build:
      targets:
        MurphysLaws: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MurphysLawsTests
        - MurphysLawsUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

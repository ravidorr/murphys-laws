name: MurphysLaws
options:
  bundleIdPrefix: com.murphyslaws
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "14.0"

settings:
  MARKETING_VERSION: "1.1.6"
  CURRENT_PROJECT_VERSION: "10"

targets:
  MurphysLaws:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MurphysLaws
        excludes:
          - "**/*.md"
          - "**/*.template"
          - "**/*.template.*"
          - "**/Tests"
          - "**/*Tests.swift"
          - "**/*IntegrationTests.swift"
          - "Resources/content"
          - "**/Info.plist"
          - "Repositories/Config.plist.template"
          - "Repositories/validate-config.sh"
      - path: ../shared/content
        name: Content
        type: group
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLaws
      INFOPLIST_FILE: MurphysLaws/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      SWIFT_VERSION: "5.9"
      ENABLE_PREVIEWS: YES
    scheme:
      testTargets:
        - MurphysLawsTests
        - MurphysLawsUITests
      testPlans:
        - path: MurphysLaws.xcodeproj/xcshareddata/xctestplans/MurphysLaws.xctestplan
          defaultPlan: true

  MurphysLawsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MurphysLawsTests
      - MurphysLawsUITests/MarkdownContentTests.swift
    dependencies:
      - target: MurphysLaws
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLawsTests
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES

  MurphysLawsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MurphysLawsUITests
        excludes:
          - MarkdownContentTests.swift
    dependencies:
      - target: MurphysLaws
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.murphyslaws.MurphysLawsUITests
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES

schemes:
  MurphysLaws:
    build:
      targets:
        MurphysLaws: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MurphysLawsTests
        - MurphysLawsUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

<div class="section-header">
  <h3 class="section-title"><span class="accent-text">Advanced</span> Search</h3>
</div>
<div class="section-body">
  <div class="advanced-search-grid">
    <div class="search-field">
      <label for="search-keyword">Search</label>
      <input
        type="text"
        id="search-keyword"
        class="input"
        placeholder="Search laws..."
      >
    </div>

    <div class="search-field">
      <label for="search-category">Category</label>
      <select id="search-category" class="input">
        <option value="">Loading categories...</option>
      </select>
    </div>

    <div class="search-field search-field-typeahead">
      <label for="search-attribution-input">Submitted By</label>
      <input
        type="text"
        id="search-attribution-input"
        class="input"
        placeholder="Search or select submitter..."
        autocomplete="off"
        role="combobox"
        aria-autocomplete="list"
        aria-controls="search-attribution-listbox"
        aria-expanded="false"
        aria-haspopup="listbox"
      >
      <!-- html-validate-disable-next prefer-native-element -->
      <div id="search-attribution-listbox" role="listbox" class="submitter-typeahead-listbox" aria-hidden="true"></div>
      <input type="hidden" id="search-attribution" value="">
    </div>

    <div class="search-actions">
      <button id="clear-btn" class="btn outline" type="button">
        <span class="icon" data-icon="clear" aria-hidden="true"></span>
        <span class="btn-text">Clear</span>
      </button>
      <button id="search-btn" class="btn" type="button">
        <span class="icon" data-icon="search" aria-hidden="true"></span>
        <span class="btn-text">Search</span>
      </button>
    </div>
  </div>
</div>

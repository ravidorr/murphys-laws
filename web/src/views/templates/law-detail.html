<div id="law-breadcrumb"></div>

<div data-loading class="loading-placeholder" role="status" aria-live="polite">
  <p class="small">Loading...</p>
</div>

<div data-law-content hidden>
  <div data-law-card-container></div>
  <section class="section section-card mb-12" data-law-context aria-labelledby="law-context-heading">
    <div class="section-header">
      <h3 id="law-context-heading" class="section-title"><span class="accent-text">In</span> context</h3>
    </div>
    <div class="section-body">
      <div class="law-context-inner">
        <p class="law-context-text" data-law-context-text></p>
      </div>
    </div>
  </section>
  <section class="section section-card related-laws-section" data-related-laws hidden>
    <div class="section-header">
      <h3 class="section-title"><span class="accent-text">Related</span> Laws</h3>
    </div>
    <div class="related-laws-list" data-related-laws-list></div>
  </section>
</div>

<div data-not-found hidden></div>

<template data-not-found-template>
  <div class="card">
    <div class="card-body">
      <div class="empty-state">
        <div class="empty-state-icon">
          <span class="icon" data-icon="searchOff" aria-hidden="true"></span>
        </div>
        <h2 class="empty-state-title"><span class="accent-text">Law</span> Not Found</h2>
        <p class="empty-state-text">The law you're looking for doesn't exist or may have been removed. But don't worry, there are plenty more laws where that came from.</p>
        <p class="not-found-quote">"If anything can go wrong, it will... including this link."</p>
        <div class="not-found-actions">
          <button type="button" class="btn" data-action="retry-law" aria-label="Try loading this law again">
            <span class="icon" data-icon="refresh" aria-hidden="true"></span>
            <span class="btn-text">Try Again</span>
          </button>
          <a href="/" class="btn outline" data-nav="home">
            <span class="icon" data-icon="home" aria-hidden="true"></span>
            <span class="btn-text">Go Home</span>
          </a>
          <button type="button" class="btn" data-nav="browse">
            <span class="btn-text">Browse All Laws</span>
            <span class="icon" data-icon="list" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</template>

<template data-law-card-template>
  <section class="section section-card mb-12" data-law-card-root>
    <div class="section-header">
      <h3 class="section-title" data-law-title><span class="visually-hidden">Loading law title...</span></h3>
    </div>
    <div class="section-body">
      <blockquote class="lod-quote-large" data-law-text></blockquote>
      <p class="lod-attrib" data-law-attribution hidden></p>
      <div class="small" data-law-submitted hidden></div>
    </div>
    <div class="section-footer">
      <div class="left">
        <div class="vote-group" role="group" aria-label="Vote. Votes are anonymous; no login required." data-tooltip="Upvote or downvote. Votes are anonymous; no login required.">
          <button type="button" class="vote-btn count-up" data-vote="up" data-id="" aria-label="Upvote this law">
            <span class="icon" data-icon="thumbUp" aria-hidden="true"></span>
            <span class="count-num" data-upvote-count>0</span>
          </button>
          <button type="button" class="vote-btn count-down" data-vote="down" data-id="" aria-label="Downvote this law">
            <span class="icon" data-icon="thumbDown" aria-hidden="true"></span>
            <span class="count-num" data-downvote-count>0</span>
          </button>
        </div>
        <div class="vote-group" role="group" aria-label="Add to favorites">
          <button type="button" class="vote-btn count-up" data-action="favorite" data-id="" data-favorite-btn aria-label="Add to favorites" data-tooltip="Add to favorites" hidden>
            <span class="icon" data-icon="bookmark" aria-hidden="true"></span>
            <span class="count-num"></span>
          </button>
        </div>
      </div>
      <div class="right">
        <button type="button" class="btn outline" data-action="random-law" aria-label="Open a random law">
          <span class="icon" data-icon="refresh" aria-hidden="true"></span>
          <span class="btn-text">Random law</span>
        </button>
        <button type="button" class="btn" data-nav="browse">
          <span class="icon" data-icon="list" aria-hidden="true"></span>
          <span class="btn-text">Browse All Laws</span>
        </button>
      </div>
    </div>
  </section>
</template>
